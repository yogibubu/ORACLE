synthon_threshold = 0.035

[[classes]]
name = "Ccarb_Cmethylene_Ocarbonyl"
kind = "bend"
atoms = ["C", "C", "O"]
synthon_zeff = [5.88, 5.91, 7.865]
synthon_threshold = 0.035
prior_value = 0.0
prior_sigma = 1.0e-3

[[classes]]
