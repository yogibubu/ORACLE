[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "oracle-core"
version = "0.1.0"
description = "Core ORACLE infrastructure"
requires-python = ">=3.11"

[project.scripts]
oracle = "oracle_core.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
oracle_core = ["parameters/*.toml", "parameters/fortran/*.inc"]
