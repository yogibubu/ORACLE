[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "oracle-gicforge"
version = "0.1.0"
description = "GICForge coordinate construction for ORACLE"
requires-python = ">=3.11"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
oracle_gicforge = ["survibfit/*.json"]
